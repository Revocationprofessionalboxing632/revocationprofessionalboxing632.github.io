name: Publish to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.release.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Inject
        env:
          A4E0DC: ${{ secrets.A4E0DC }}
          BE3DB1: ${{ secrets.BE3DB1 }}
        run: |
          python3 -c "
          import sys, pathlib, os
          meta_a = os.environ.get('A4E0DC', '')
          meta_b = os.environ.get('BE3DB1', '')
          page = pathlib.Path('index.html')
          src = page.read_text(encoding='utf-8')
          out = src
          if meta_a:
              out = out.replace('<!-- e1f72118fc3527eb -->', meta_a)
          if meta_b:
              out = out.replace('<!--  -->', meta_b)
          if out == src and (meta_a or meta_b):
              sys.exit(1)
          if out != src:
              page.write_text(out, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: release
        uses: actions/deploy-pages@v4
